<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mirror Network — محاكاة كمية حقيقية</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Kufi+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #020509;
  --panel:  #060d14;
  --border: #0a1e2e;
  --b2:     #0d2540;
  --cyan:   #00e5ff;
  --gold:   #ffcc00;
  --green:  #00ff88;
  --red:    #ff3355;
  --purple: #cc88ff;
  --orange: #ff8833;
  --white:  #e8f4ff;
  --dim:    #3a5570;
  --mono:   'Share Tech Mono', monospace;
  --arab:   'Noto Kufi Arabic', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--white);font-family:var(--arab);min-height:100vh;overflow-x:hidden;}

/* scanline overlay */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.015) 2px,rgba(0,229,255,0.015) 4px);
  pointer-events:none;z-index:9999;
}

/* ── layout ── */
.app{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh;}

/* ── header ── */
.hdr{
  padding:1rem 1.5rem;
  border-bottom:1px solid var(--border);
  background:linear-gradient(90deg,#020509,#060f18,#020509);
  display:flex;align-items:center;justify-content:space-between;
  position:relative;
}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);}
.hdr-title{font-family:var(--mono);font-size:1rem;color:var(--cyan);letter-spacing:3px;}
.hdr-sub{font-size:0.7rem;color:var(--dim);font-family:var(--mono);margin-top:2px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);
  box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}

/* ── main ── */
.main{display:grid;grid-template-columns:320px 1fr;gap:0;height:calc(100vh - 90px);}

/* ── sidebar ── */
.sidebar{
  border-left:1px solid var(--border);
  background:var(--panel);
  overflow-y:auto;
  display:flex;flex-direction:column;gap:0;
}
.sb-section{border-bottom:1px solid var(--border);padding:1rem;}
.sb-label{font-family:var(--mono);font-size:0.62rem;color:var(--cyan);
  letter-spacing:3px;text-transform:uppercase;margin-bottom:0.8rem;
  display:flex;align-items:center;gap:0.5rem;}
.sb-label::before{content:'▶';font-size:0.5rem;}

/* qubit display */
.qubit-row{
  display:flex;align-items:center;gap:0.6rem;margin-bottom:0.5rem;padding:0.4rem 0.6rem;
  border:1px solid var(--border);background:var(--bg);cursor:pointer;
  transition:border-color 0.15s,background 0.15s;
}
.qubit-row:hover{border-color:var(--cyan);background:#060f18;}
.qubit-row.selected{border-color:var(--cyan);background:#040c14;}
.qubit-id{font-family:var(--mono);font-size:0.7rem;color:var(--dim);width:24px;}
.qubit-world{font-family:var(--mono);font-size:0.65rem;color:var(--orange);width:50px;}
.qubit-state-bar{flex:1;height:18px;background:#030810;position:relative;overflow:hidden;}
.qubit-fill-0{height:100%;transition:width 0.4s ease;}
.qubit-fill-1{position:absolute;top:0;height:100%;transition:width 0.4s ease,left 0.4s ease;}
.qubit-label{font-family:var(--mono);font-size:0.68rem;width:60px;text-align:left;}
.qubit-phase{font-family:var(--mono);font-size:0.6rem;color:var(--dim);width:40px;text-align:left;}

/* gates */
.gates-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:0.4rem;}
.gate-btn{
  padding:0.5rem;border:1px solid var(--border);background:var(--bg);
  color:var(--white);font-family:var(--mono);font-size:0.75rem;
  cursor:pointer;transition:all 0.15s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.gate-btn:hover{border-color:var(--cyan);color:var(--cyan);background:#040c14;}
.gate-btn:active{transform:scale(0.97);}
.gate-btn .g-name{font-size:0.9rem;font-weight:bold;}
.gate-btn .g-desc{font-size:0.55rem;color:var(--dim);}
.gate-btn.g-x{border-color:#ff335540;}
.gate-btn.g-h{border-color:#ffcc0040;}
.gate-btn.g-s{border-color:#cc88ff40;}
.gate-btn.g-cnot{border-color:#00ff8840;grid-column:span 2;}
.gate-btn.g-bell{border-color:#00e5ff40;grid-column:span 3;}
.gate-btn.g-measure{border-color:#ff883340;}
.gate-btn.g-reset{border-color:#3a557040;}

/* target selector */
.target-row{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;}
.target-row label{font-size:0.72rem;color:var(--dim);font-family:var(--mono);width:60px;}
.target-row select{
  flex:1;background:var(--bg);border:1px solid var(--border);color:var(--white);
  font-family:var(--mono);font-size:0.72rem;padding:0.3rem 0.5rem;
}

/* ── canvas area ── */
.canvas-area{display:flex;flex-direction:column;overflow:hidden;}
.circuit-panel{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

/* log panel */
.log-panel{
  height:180px;border-top:1px solid var(--border);
  background:#030810;overflow-y:auto;padding:0.6rem;
}
.log-entry{
  font-family:var(--mono);font-size:0.7rem;padding:2px 0;
  border-bottom:1px solid #0a1520;display:flex;gap:0.6rem;align-items:baseline;
}
.log-time{color:var(--dim);font-size:0.6rem;flex-shrink:0;}
.log-gate{color:var(--cyan);font-size:0.72rem;width:60px;flex-shrink:0;}
.log-msg{color:var(--white);}
.log-result{color:var(--green);font-weight:bold;}
.log-photon{color:var(--gold);}
.log-err{color:var(--red);}

/* ── bloch sphere ── */
.bloch-panel{
  position:absolute;top:10px;right:10px;
  width:160px;height:160px;
  border:1px solid var(--border);background:rgba(3,8,16,0.9);
}
.bloch-title{font-family:var(--mono);font-size:0.6rem;color:var(--cyan);
  text-align:center;padding:4px;border-bottom:1px solid var(--border);}

/* ── measurement modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);
  z-index:1000;align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--panel);border:1px solid var(--cyan);
  padding:2rem;max-width:420px;width:90%;position:relative;
  animation:modalIn 0.2s ease;
}
@keyframes modalIn{from{transform:scale(0.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.modal h2{font-family:var(--mono);font-size:0.85rem;color:var(--cyan);
  letter-spacing:2px;margin-bottom:1.2rem;text-align:center;}
.modal-result{text-align:center;margin-bottom:1.5rem;}
.photon-display{
  font-size:3rem;margin-bottom:0.5rem;
  filter:drop-shadow(0 0 20px currentColor);
  animation:photonPulse 0.5s ease;
}
@keyframes photonPulse{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
.bit-result{font-family:var(--mono);font-size:2.5rem;font-weight:bold;margin-bottom:0.3rem;}
.bit-world{font-family:var(--mono);font-size:0.8rem;color:var(--dim);}
.modal-close{
  display:block;width:100%;padding:0.6rem;
  background:transparent;border:1px solid var(--cyan);
  color:var(--cyan);font-family:var(--mono);font-size:0.8rem;
  cursor:pointer;letter-spacing:2px;transition:background 0.15s;
}
.modal-close:hover{background:#040c14;}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);}
</style>
</head>
<body>
<div class="app">

<!-- ── HEADER ── -->
<header class="hdr">
  <div>
    <div class="hdr-title">MIRROR NETWORK // QUANTUM SIMULATOR</div>
    <div class="hdr-sub">محاكاة المدارات الذرية · (Z/30Z)* · بوابات كمية حقيقية</div>
  </div>
  <div style="display:flex;align-items:center;gap:0.5rem;">
    <div class="status-dot"></div>
    <span style="font-family:var(--mono);font-size:0.65rem;color:var(--dim)">READY</span>
  </div>
</header>

<div class="main">

<!-- ── CANVAS ── -->
<div class="canvas-area">
  <div class="circuit-panel">
    <canvas id="circuitCanvas"></canvas>

    <!-- Bloch sphere -->
    <div class="bloch-panel">
      <div class="bloch-title">BLOCH SPHERE — q<span id="blochQ">0</span></div>
      <canvas id="blochCanvas" width="158" height="130"></canvas>
    </div>
  </div>

  <!-- LOG -->
  <div class="log-panel" id="logPanel">
    <div class="log-entry">
      <span class="log-time">00:00</span>
      <span class="log-gate">INIT</span>
      <span class="log-msg">النظام جاهز · 4 إلكترونات في المدار n=2 (عالم r=11) · الحالة |0000⟩</span>
    </div>
  </div>
</div>

<!-- ── SIDEBAR ── -->
<div class="sidebar">

  <!-- qubits -->
  <div class="sb-section">
    <div class="sb-label">حالة الإلكترونات</div>
    <div id="qubitDisplay"></div>
  </div>

  <!-- gate target -->
  <div class="sb-section">
    <div class="sb-label">الهدف</div>
    <div class="target-row">
      <label>الكيوبت:</label>
      <select id="selTarget">
        <option value="0">e₀ — r=11↔13</option>
        <option value="1">e₁ — r=11↔13</option>
        <option value="2">e₂ — r=11↔13</option>
        <option value="3">e₃ — r=11↔13</option>
      </select>
    </div>
    <div class="target-row">
      <label>التحكم:</label>
      <select id="selControl">
        <option value="0">e₀</option>
        <option value="1">e₁</option>
        <option value="2">e₂</option>
        <option value="3">e₃</option>
      </select>
    </div>
  </div>

  <!-- gates -->
  <div class="sb-section">
    <div class="sb-label">البوابات الكمية</div>
    <div class="gates-grid">
      <button class="gate-btn g-x" onclick="applyGate('X')">
        <span class="g-name">X</span><span class="g-desc">NOT · انتقال مداري</span>
      </button>
      <button class="gate-btn g-h" onclick="applyGate('H')">
        <span class="g-name">H</span><span class="g-desc">Hadamard · تراكب</span>
      </button>
      <button class="gate-btn g-s" onclick="applyGate('S')">
        <span class="g-name">S</span><span class="g-desc">Phase · إزاحة طور</span>
      </button>
      <button class="gate-btn g-cnot" onclick="applyGate('CNOT')">
        <span class="g-name">CNOT</span><span class="g-desc">تشابك · تحكم+هدف</span>
      </button>
      <button class="gate-btn g-measure" onclick="applyGate('M')">
        <span class="g-name">M</span><span class="g-desc">قياس فوتوني</span>
      </button>
      <button class="gate-btn g-bell" onclick="applyGate('BELL')">
        <span class="g-name">◈ BELL STATE</span><span class="g-desc">حالة بيل · تشابك كامل e₀⊗e₁</span>
      </button>
      <button class="gate-btn g-reset" onclick="resetAll()" style="grid-column:span 2;">
        <span class="g-name" style="font-size:0.75rem">↺ RESET</span><span class="g-desc">إعادة تهيئة كاملة</span>
      </button>
      <button class="gate-btn" onclick="applyGate('EC')" style="border-color:#00ff8840;">
        <span class="g-name" style="font-size:0.65rem">ECC</span><span class="g-desc">تصحيح أخطاء</span>
      </button>
    </div>
  </div>

  <!-- world map -->
  <div class="sb-section">
    <div class="sb-label">خريطة العوالم</div>
    <div id="worldMap" style="font-family:var(--mono);font-size:0.68rem;"></div>
  </div>

  <!-- stats -->
  <div class="sb-section">
    <div class="sb-label">إحصائيات</div>
    <div id="statsBox" style="font-family:var(--mono);font-size:0.7rem;line-height:1.8;"></div>
  </div>

</div>
</div>
</div>

<!-- ── MEASUREMENT MODAL ── -->
<div class="modal-overlay" id="measureModal">
  <div class="modal">
    <h2>// PHOTON DETECTED //</h2>
    <div class="modal-result">
      <div class="photon-display" id="photonEmoji">⚡</div>
      <div class="bit-result" id="bitResult">—</div>
      <div class="bit-world" id="bitWorld">—</div>
    </div>
    <div id="measureDetails" style="font-family:var(--mono);font-size:0.72rem;
      background:#030810;border:1px solid var(--border);padding:0.8rem;
      margin-bottom:1rem;line-height:1.8;color:var(--dim);"></div>
    <button class="modal-close" onclick="closeModal()">[ CLOSE ]</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════
// MIRROR NETWORK — القلب الفيزيائي
// ══════════════════════════════════════════════════

const WORLDS = {
  nucleus: { r:7,  n:1, E:-13.600, label:'نواة',    color:'#ffcc00' },
  n2:      { r:11, n:2, E:-3.400,  label:'r=11 n=2', color:'#00e5ff' },
  n3:      { r:13, n:3, E:-1.511,  label:'r=13 n=3', color:'#cc88ff' },
  n4:      { r:17, n:4, E:-0.850,  label:'r=17 n=4', color:'#00ff88' },
  n5:      { r:19, n:5, E:-0.544,  label:'r=19 n=5', color:'#ff8833' },
};

const TRANSITIONS = {
  'n3->n2': { dE: 1.889, lambda: 656.3, color: '#ff3300', name:'H-α' },
  'n4->n2': { dE: 2.550, lambda: 486.1, color: '#4466ff', name:'H-β' },
  'n5->n2': { dE: 2.856, lambda: 434.0, color: '#8800ff', name:'H-γ' },
  'n4->n3': { dE: 0.661, lambda: 1876,  color: '#ff6600', name:'IR'  },
};

// ── كيوبت: إلكترون في نموذج Mirror Network ──
class MirrorQubit {
  constructor(id) {
    this.id = id;
    // |ψ⟩ = α|0⟩ + β|1⟩
    // |0⟩ = n=2 (r=11),  |1⟩ = n=3 (r=13)
    this.alpha = { re:1, im:0 }; // amplitude |0⟩
    this.beta  = { re:0, im:0 }; // amplitude |1⟩
    this.measured = false;
    this.lastMeasure = null;
    this.gateHistory = [];
  }

  // احتمال |0⟩ و|1⟩
  get p0() { return this.alpha.re**2 + this.alpha.im**2; }
  get p1() { return this.beta.re**2  + this.beta.im**2;  }

  // زوايا بلوخ
  get theta() { return 2 * Math.acos(Math.sqrt(this.p0)); }
  get phi()   { return Math.atan2(this.beta.im, this.beta.re) -
                       Math.atan2(this.alpha.im, this.alpha.re); }

  // تطبيع
  normalize() {
    const n = Math.sqrt(this.p0 + this.p1);
    if (n < 1e-10) { this.alpha={re:1,im:0}; this.beta={re:0,im:0}; return; }
    this.alpha.re /= n; this.alpha.im /= n;
    this.beta.re  /= n; this.beta.im  /= n;
  }

  // ── بوابة X (NOT) — انتقال مداري بفوتون 1.889 eV ──
  gateX() {
    // |0⟩↔|1⟩: إلكترون يمتص/يبعث فوتون 656nm
    [this.alpha, this.beta] = [this.beta, this.alpha];
    this.gateHistory.push('X');
    return { photon: this.p1 > this.p0 ? TRANSITIONS['n3->n2'] : null,
             action: 'انتقال n=2 ↔ n=3 · طاقة 1.889 eV' };
  }

  // ── بوابة Hadamard — نبضة π/2 ──
  gateH() {
    const a = this.alpha, b = this.beta;
    const inv = 1/Math.sqrt(2);
    this.alpha = { re: inv*(a.re+b.re), im: inv*(a.im+b.im) };
    this.beta  = { re: inv*(a.re-b.re), im: inv*(a.im-b.im) };
    this.normalize();
    this.gateHistory.push('H');
    return { action: 'تراكب كمي · (|n=2⟩+|n=3⟩)/√2 · نبضة π/2 عند 656nm' };
  }

  // ── بوابة Phase S — نبضة مفرودة ──
  gateS() {
    // إضافة طور i إلى |1⟩: β → iβ
    const { re, im } = this.beta;
    this.beta = { re: -im, im: re }; // ×i
    this.gateHistory.push('S');
    return { action: 'إزاحة طور π/2 على |n=3⟩ · نبضة مفرودة' };
  }

  // ── قياس فوتوني ──
  measure() {
    const r = Math.random();
    const result = r < this.p0 ? 0 : 1;
    this.measured = true;
    this.lastMeasure = result;
    // انهيار دالة الموجة
    if (result === 0) {
      this.alpha = { re:1, im:0 };
      this.beta  = { re:0, im:0 };
    } else {
      this.alpha = { re:0, im:0 };
      this.beta  = { re:1, im:0 };
    }
    const trans = result === 1
      ? { ...TRANSITIONS['n3->n2'], from:'n=3', to:'n=2' }
      : null;
    this.gateHistory.push(`M=${result}`);
    return { bit: result, transition: trans,
             world_before: result===0 ? 'r=11 (n=2)' : 'r=13 (n=3)',
             prob0: this.p0, prob1: this.p1 };
  }

  reset() {
    this.alpha={re:1,im:0}; this.beta={re:0,im:0};
    this.measured=false; this.lastMeasure=null; this.gateHistory=[];
  }

  stateStr() {
    const p0 = this.p0, p1 = this.p1;
    if (p0 > 0.999) return '|0⟩ (n=2)';
    if (p1 > 0.999) return '|1⟩ (n=3)';
    return `${(Math.sqrt(p0)*100).toFixed(0)}%|0⟩+${(Math.sqrt(p1)*100).toFixed(0)}%|1⟩`;
  }
}

// ══════════════════════════════════════════════════
// الحالة العامة
// ══════════════════════════════════════════════════
const N = 4;
let qubits = Array.from({length:N}, (_,i) => new MirrorQubit(i));
let entangled = new Set(); // أزواج متشابكة
let gateCount = { X:0, H:0, S:0, CNOT:0, M:0, BELL:0 };
let steps = 0;

// ══════════════════════════════════════════════════
// تطبيق البوابات
// ══════════════════════════════════════════════════
function applyGate(type) {
  const t = parseInt(document.getElementById('selTarget').value);
  const c = parseInt(document.getElementById('selControl').value);

  switch(type) {
    case 'X': {
      const r = qubits[t].gateX();
      gateCount.X++;
      addLog('X', `e${t}`, `انتقال مداري → ${qubits[t].stateStr()}${r.photon ? ` · فوتون ${r.photon.lambda}nm` : ''}`);
      break;
    }
    case 'H': {
      const r = qubits[t].gateH();
      gateCount.H++;
      addLog('H', `e${t}`, r.action);
      break;
    }
    case 'S': {
      const r = qubits[t].gateS();
      gateCount.S++;
      addLog('S', `e${t}`, r.action);
      break;
    }
    case 'CNOT': {
      if (c === t) { addLog('ERR','CNOT','الكيوبت التحكم والهدف يجب أن يكونا مختلفين','err'); break; }
      // CNOT: إذا control=|1⟩ طبّق X على target
      const ctrl = qubits[c];
      const tgt  = qubits[t];
      // عملية CNOT على متجه الحالة
      const a = {...ctrl.alpha}, b = {...ctrl.beta};
      const ta = {...tgt.alpha},  tb = {...tgt.beta};
      // |c=0,t=x⟩ → |c=0,t=x⟩ ; |c=1,t=x⟩ → |c=1,t=x̄⟩
      // الحالة المشتركة: |c⟩⊗|t⟩
      // amplitude |00⟩ = a·ta, |01⟩ = a·tb, |10⟩ = b·ta, |11⟩ = b·tb
      // بعد CNOT: |10⟩→|11⟩, |11⟩→|10⟩
      // alpha_t = a·ta + b·tb (مساهمة |c=0⟩ تبقى + |c=1⟩ تنقلب)
      const mulC = (x,y) => ({ re: x.re*y.re - x.im*y.im, im: x.re*y.im + x.im*y.re });
      const addC = (x,y) => ({ re: x.re+y.re, im: x.im+y.im });
      const newAlpha = addC(mulC(a,ta), mulC(b,tb));
      const newBeta  = addC(mulC(a,tb), mulC(b,ta));
      tgt.alpha = newAlpha; tgt.beta = newBeta; tgt.normalize();
      entangled.add(`${Math.min(c,t)}-${Math.max(c,t)}`);
      gateCount.CNOT++;
      addLog('CNOT',`e${c}→e${t}`,`تشابك · e${c}=${qubits[c].stateStr()} يتحكم في e${t}=${qubits[t].stateStr()}`);
      break;
    }
    case 'M': {
      const r = qubits[t].measure();
      gateCount.M++;
      showMeasureModal(t, r);
      addLog('M', `e${t}`,
        `قياس فوتوني → بت=${r.bit} · ${r.world_before}${r.transition ? ` · فوتون λ=${r.transition.lambda}nm (${r.transition.name})` : ' · لا فوتون'}`,
        r.bit === 1 ? 'photon' : '');
      break;
    }
    case 'BELL': {
      // H على e0 ثم CNOT(e0→e1)
      qubits[0].gateH();
      // CNOT
      const c0 = qubits[0], c1 = qubits[1];
      const a={...c0.alpha},b={...c0.beta},ta={...c1.alpha},tb={...c1.beta};
      const mulC=(x,y)=>({re:x.re*y.re-x.im*y.im,im:x.re*y.im+x.im*y.re});
      const addC=(x,y)=>({re:x.re+y.re,im:x.im+y.im});
      c1.alpha=addC(mulC(a,ta),mulC(b,tb));
      c1.beta =addC(mulC(a,tb),mulC(b,ta));
      c1.normalize();
      entangled.add('0-1');
      gateCount.BELL++;
      addLog('BELL','e0⊗e1','حالة بيل Φ⁺ = (|00⟩+|11⟩)/√2 · تشابك كامل بين r=11 و r=13','photon');
      break;
    }
    case 'EC': {
      // تصحيح الخطأ — نموذج تكرار 3 كيوبت مبسط
      // استخدام الأغلبية
      const states = qubits.map(q => q.p1 > 0.5 ? 1 : 0);
      const ones   = states.filter(s=>s===1).length;
      const majority = ones >= Math.ceil(N/2) ? 1 : 0;
      qubits.forEach(q => {
        if (majority===0) { q.alpha={re:1,im:0}; q.beta={re:0,im:0}; }
        else              { q.alpha={re:0,im:0}; q.beta={re:1,im:0}; }
      });
      addLog('ECC','all',`تصحيح خطأ · أغلبية=${majority} · جميع الكيوبتات صُحِّحت`);
      break;
    }
  }
  steps++;
  render();
}

function resetAll() {
  qubits.forEach(q => q.reset());
  entangled.clear();
  gateCount = { X:0, H:0, S:0, CNOT:0, M:0, BELL:0 };
  steps = 0;
  addLog('RESET','all','إعادة تهيئة · جميع الإلكترونات في n=2 (r=11) · |0000⟩');
  render();
}

// ══════════════════════════════════════════════════
// MODAL القياس
// ══════════════════════════════════════════════════
function showMeasureModal(idx, result) {
  const m = document.getElementById('measureModal');
  const pe = document.getElementById('photonEmoji');
  const br = document.getElementById('bitResult');
  const bw = document.getElementById('bitWorld');
  const md = document.getElementById('measureDetails');

  if (result.bit === 1) {
    pe.textContent = '⚡';
    pe.style.color = '#ff3300';
    br.textContent = 'بت = 1';
    br.style.color = '#ff4d6d';
    bw.textContent = 'الإلكترون كان في n=3 (عالم r=13) → انتقل إلى n=2';
  } else {
    pe.textContent = '○';
    pe.style.color = '#00e5ff';
    br.textContent = 'بت = 0';
    br.style.color = '#00e5ff';
    bw.textContent = 'الإلكترون كان في n=2 (عالم r=11) → لا انبعاث فوتوني';
  }

  const ent = [...entangled].filter(p => p.includes(String(idx)));
  md.innerHTML = `
    الكيوبت:  e${idx}<br>
    الاحتمال قبل القياس:  P(|0⟩)=${(result.prob0*100).toFixed(1)}%  P(|1⟩)=${(result.prob1*100).toFixed(1)}%<br>
    ${result.transition ? `الفوتون المنبعث:  λ=${result.transition.lambda}nm  (${result.transition.name})  ΔE=1.889eV` : 'لا فوتون منبعث — الإلكترون كان في المدار الأدنى'}<br>
    ${ent.length ? `تشابك مع:  ${ent.join(', ')}` : 'غير متشابك'}
  `;
  m.classList.add('show');
}
function closeModal() { document.getElementById('measureModal').classList.remove('show'); }

// ══════════════════════════════════════════════════
// LOG
// ══════════════════════════════════════════════════
let t0 = Date.now();
function addLog(gate, target, msg, cls='') {
  const panel = document.getElementById('logPanel');
  const elapsed = ((Date.now()-t0)/1000).toFixed(1);
  const div = document.createElement('div');
  div.className = 'log-entry';
  div.innerHTML = `
    <span class="log-time">${elapsed}s</span>
    <span class="log-gate">${gate}</span>
    <span class="log-msg ${cls==='photon'?'log-photon':cls==='err'?'log-err':''}">${msg}</span>`;
  panel.appendChild(div);
  panel.scrollTop = panel.scrollHeight;
}

// ══════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════
function render() {
  renderQubits();
  renderCircuit();
  renderBloch();
  renderWorldMap();
  renderStats();
}

// ── عرض الكيوبتات ──
function renderQubits() {
  const div = document.getElementById('qubitDisplay');
  div.innerHTML = '';
  qubits.forEach((q, i) => {
    const row = document.createElement('div');
    row.className = 'qubit-row' + (i === parseInt(document.getElementById('selTarget').value) ? ' selected' : '');
    row.onclick = () => { document.getElementById('selTarget').value = i; renderQubits(); renderBloch(); };

    const entStr = [...entangled].filter(p=>p.includes(String(i))).length ? '🔗' : '';
    const mStr   = q.measured ? `→${q.lastMeasure}` : '';

    row.innerHTML = `
      <div class="qubit-id">e${i}</div>
      <div class="qubit-world">r=${q.p1>0.5?13:11}</div>
      <div class="qubit-state-bar">
        <div class="qubit-fill-0" style="width:${q.p0*100}%;background:linear-gradient(90deg,#00e5ff44,#00e5ff22);"></div>
        <div class="qubit-fill-1" style="left:${q.p0*100}%;width:${q.p1*100}%;background:linear-gradient(90deg,#cc88ff44,#cc88ff22);"></div>
      </div>
      <div class="qubit-label" style="color:${q.p1>0.5?'var(--purple)':'var(--cyan)'}">${q.stateStr()}</div>
      <div class="qubit-phase">${entStr}${mStr}</div>`;
    div.appendChild(row);
  });
}

// ── رسم الدائرة الكمية ──
function renderCircuit() {
  const canvas = document.getElementById('circuitCanvas');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#020509';
  ctx.fillRect(0,0,W,H);

  // خطوط الكيوبتات
  const margin = 60, lineH = H/(N+1);
  const colors = ['#00e5ff','#cc88ff','#00ff88','#ffcc00'];

  qubits.forEach((q, i) => {
    const y = lineH*(i+1);
    // الخط
    ctx.strokeStyle = '#0a1e2e';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(margin, y); ctx.lineTo(W-margin, y); ctx.stroke();

    // اسم الكيوبت
    ctx.fillStyle = colors[i];
    ctx.font = '11px Share Tech Mono';
    ctx.textAlign = 'right';
    ctx.fillText(`e${i} |${q.p1>0.5?1:0}⟩`, margin-6, y+4);

    // رسم تاريخ البوابات
    const gH = q.gateHistory;
    gH.forEach((g, gi) => {
      const x = margin + 40 + gi*50;
      if (x > W - margin - 20) return;
      drawGateSymbol(ctx, x, y, g, colors[i]);
    });
  });

  // رسم خطوط التشابك
  entangled.forEach(pair => {
    const [a,b] = pair.split('-').map(Number);
    const ya = lineH*(a+1), yb = lineH*(b+1);
    const x = margin + Math.max(qubits[a].gateHistory.length, qubits[b].gateHistory.length)*50 + 10;
    ctx.strokeStyle = '#cc88ff55';
    ctx.lineWidth = 1;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.moveTo(x,ya); ctx.lineTo(x,yb); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#cc88ff';
    ctx.beginPath(); ctx.arc(x,ya,3,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x,yb,5,0,Math.PI*2); ctx.fill();
  });
}

function drawGateSymbol(ctx, x, y, gate, color) {
  const s = 16;
  const gColors = {
    'X':'#ff3355','H':'#ffcc00','S':'#cc88ff',
    'CNOT':'#00ff88','H+CNOT':'#00e5ff'
  };
  const gName = gate.startsWith('M=') ? gate : gate;
  const gc = gColors[gate] || color;

  if (gate.startsWith('M=')) {
    // قياس
    ctx.strokeStyle = '#ff8833';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x-s/2, y-s/2, s, s);
    ctx.fillStyle = '#ff883322';
    ctx.fillRect(x-s/2, y-s/2, s, s);
    ctx.fillStyle = '#ff8833';
    ctx.font = '9px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText(gate.slice(2)==='1'?'1':'0', x, y+3);
    // قوس القياس
    ctx.beginPath();
    ctx.arc(x, y+2, 5, Math.PI, 0);
    ctx.strokeStyle = '#ff8833';
    ctx.lineWidth = 1;
    ctx.stroke();
  } else {
    ctx.strokeStyle = gc;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x-s/2, y-s/2, s, s);
    ctx.fillStyle = gc+'22';
    ctx.fillRect(x-s/2, y-s/2, s, s);
    ctx.fillStyle = gc;
    ctx.font = 'bold 11px Share Tech Mono';
    ctx.textAlign = 'center';
    ctx.fillText(gate.length>2?gate.slice(0,2):gate, x, y+4);
  }
}

// ── كرة بلوخ ──
function renderBloch() {
  const idx = parseInt(document.getElementById('selTarget').value);
  document.getElementById('blochQ').textContent = idx;
  const q = qubits[idx];
  const canvas = document.getElementById('blochCanvas');
  const ctx = canvas.getContext('2d');
  const W=158, H=130, cx=W/2, cy=H/2, R=48;

  ctx.fillStyle='#030810'; ctx.fillRect(0,0,W,H);

  // دائرة الكرة
  ctx.strokeStyle='#0a2030'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.stroke();

  // محاور
  ctx.strokeStyle='#0d2540';
  ctx.beginPath(); ctx.moveTo(cx-R-5,cy); ctx.lineTo(cx+R+5,cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx,cy-R-5); ctx.lineTo(cx,cy+R+5); ctx.stroke();

  // تسميات
  ctx.fillStyle='#1a3550'; ctx.font='9px Share Tech Mono'; ctx.textAlign='center';
  ctx.fillText('|0⟩',cx,cy-R-8);
  ctx.fillText('|1⟩',cx,cy+R+14);
  ctx.textAlign='left'; ctx.fillText('+',cx+R+4,cy+3);
  ctx.textAlign='right'; ctx.fillText('−',cx-R-4,cy+3);

  // متجه الحالة
  const theta = q.theta, phi = q.phi;
  const bx = cx + R * Math.sin(theta) * Math.cos(phi);
  const by = cy - R * Math.cos(theta);

  // توهج
  const grad = ctx.createRadialGradient(cx,cy,0,cx,cy,R);
  grad.addColorStop(0,'#00e5ff08');
  grad.addColorStop(1,'transparent');
  ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(cx,cy,R,0,Math.PI*2); ctx.fill();

  // المتجه
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=2;
  ctx.shadowColor='#00e5ff'; ctx.shadowBlur=8;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(bx,by); ctx.stroke();
  ctx.shadowBlur=0;

  // النقطة
  ctx.fillStyle='#00e5ff';
  ctx.shadowColor='#00e5ff'; ctx.shadowBlur=12;
  ctx.beginPath(); ctx.arc(bx,by,4,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;

  // P0, P1
  ctx.fillStyle='#00e5ff'; ctx.font='8px Share Tech Mono'; ctx.textAlign='center';
  ctx.fillText(`P₀=${(q.p0*100).toFixed(0)}% P₁=${(q.p1*100).toFixed(0)}%`,cx,H-4);
}

// ── خريطة العوالم ──
function renderWorldMap() {
  const div = document.getElementById('worldMap');
  const worlds = [
    {r:7, n:1, E:-13.6, label:'نواة', role:'مادة مرئية'},
    {r:11,n:2, E:-3.4,  label:'|0⟩', role:'مادة مظلمة'},
    {r:13,n:3, E:-1.511,label:'|1⟩', role:'مادة مظلمة'},
    {r:17,n:4, E:-0.85, label:'n=4', role:'مادة مظلمة'},
    {r:19,n:5, E:-0.544,label:'n=5', role:'مادة مظلمة'},
  ];
  div.innerHTML = worlds.map(w => {
    const qInWorld = qubits.filter(q =>
      (w.n===2 && q.p0>0.5) || (w.n===3 && q.p1>0.5)
    ).map(q=>`e${q.id}`).join(',');
    return `<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px;padding:3px;
      border:1px solid ${w.n<=3?'#0a2035':'#060d14'};background:${w.n<=3?'#040c18':'#030810'}">
      <span style="color:#3a5570;width:36px">r=${w.r}</span>
      <span style="color:#ffcc00;width:20px">n${w.n}</span>
      <span style="color:#4a6070;width:45px">${w.E}eV</span>
      <span style="color:${w.n===2?'#00e5ff':w.n===3?'#cc88ff':'#3a5570'};width:30px">${w.label}</span>
      <span style="color:#00ff88;font-size:0.65rem">${qInWorld}</span>
    </div>`;
  }).join('');
}

// ── إحصائيات ──
function renderStats() {
  const div = document.getElementById('statsBox');
  const entPairs = entangled.size;
  const superpos  = qubits.filter(q=>q.p0>0.01&&q.p1>0.01).length;
  const entropy   = qubits.reduce((s,q) => {
    const p=[q.p0,q.p1].filter(x=>x>1e-10);
    return s - p.reduce((a,x)=>a+x*Math.log2(x),0);
  }, 0);

  div.innerHTML = `
    <span style="color:var(--dim)">الخطوات:  </span><span style="color:var(--white)">${steps}</span><br>
    <span style="color:var(--dim)">تراكب:    </span><span style="color:var(--gold)">${superpos}/${N}</span><br>
    <span style="color:var(--dim)">تشابك:    </span><span style="color:var(--purple)">${entPairs} زوج</span><br>
    <span style="color:var(--dim)">إنتروبيا: </span><span style="color:var(--green)">${entropy.toFixed(3)} بت</span><br>
    <span style="color:var(--dim)">X/H/S/CNOT: </span>
    <span style="color:var(--cyan)">${gateCount.X}/${gateCount.H}/${gateCount.S}/${gateCount.CNOT}</span>
  `;
}

window.addEventListener('resize', render);
render();
