<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مولّد الأوليات — شبكة المرايا v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Cairo:wght@400;700;900&display=swap');
:root{
  --bg:#05080f;--panel:#090e1a;--border:#141f35;
  --text:#6b8caa;--bright:#d4eaf7;--dim:#1e3050;
  --accent:#00e5ff;--gold:#ffc740;--green:#00ff9d;
  --red:#ff3d5a;--purple:#b060ff;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 70% 50% at 20% 30%,rgba(0,229,255,.05),transparent 60%),
             radial-gradient(ellipse 60% 40% at 80% 70%,rgba(176,96,255,.05),transparent 60%);
  pointer-events:none;}
header{text-align:center;margin-bottom:1.5rem;position:relative;z-index:1;}
.logo{width:52px;height:52px;border:2px solid var(--accent);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:var(--accent);
  box-shadow:0 0 30px rgba(0,229,255,.4);animation:glow 3s ease-in-out infinite;margin:0 auto .7rem;}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(0,229,255,.3);}50%{box-shadow:0 0 50px rgba(0,229,255,.7);}}
h1{font-family:'Cairo',sans-serif;font-size:1.3rem;font-weight:900;color:var(--bright);}
.sub{font-size:.52rem;color:var(--dim);margin-top:.2rem;letter-spacing:.1em;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;
  padding:1.3rem 1.8rem;width:100%;max-width:640px;position:relative;z-index:1;margin-bottom:1rem;}
.input-row{display:flex;gap:.6rem;align-items:center;margin-bottom:.8rem;}
input[type=text]{flex:1;background:rgba(0,50,100,.3);border:2px solid var(--border);border-radius:8px;
  color:var(--bright);padding:.6rem .9rem;font-family:'Space Mono',monospace;font-size:1rem;
  outline:none;text-align:center;transition:border-color .2s;}
input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 15px rgba(0,229,255,.15);}
.go-btn{background:rgba(0,100,200,.25);border:2px solid var(--accent);color:var(--accent);
  padding:.6rem 1.4rem;border-radius:8px;font-family:'Space Mono',monospace;font-size:.85rem;
  cursor:pointer;transition:all .2s;}
.go-btn:hover{background:rgba(0,229,255,.2);}
.modes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;margin-bottom:.5rem;}
.mbtn{background:rgba(0,20,50,.4);border:1px solid var(--border);color:var(--text);
  padding:.45rem .3rem;border-radius:6px;font-family:'Space Mono',monospace;font-size:.56rem;
  cursor:pointer;text-align:center;line-height:1.7;transition:all .15s;}
.mbtn:hover{border-color:rgba(0,229,255,.4);color:var(--accent);}
.mbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,229,255,.08);}
.hint{font-size:.5rem;color:var(--dim);text-align:center;margin-top:.3rem;}
.result{display:none;}
.result.show{display:block;}
.verdict{text-align:center;padding:1rem;border-radius:10px;margin-bottom:.9rem;transition:all .3s;}
.vp{background:rgba(0,255,157,.07);border:2px solid rgba(0,255,157,.3);}
.vn{background:rgba(255,61,90,.06);border:2px solid rgba(255,61,90,.25);}
.vm{background:rgba(255,199,64,.06);border:2px solid rgba(255,199,64,.25);}
.vnum{font-size:1.8rem;font-weight:700;letter-spacing:.03em;word-break:break-all;}
.vlbl{font-size:.68rem;margin-top:.3rem;letter-spacing:.08em;}
.vtim{font-size:.48rem;color:var(--dim);margin-top:.2rem;}
.copy-btn{display:inline-flex;align-items:center;gap:.35rem;margin-top:.55rem;
  background:rgba(0,50,100,.35);border:1px solid var(--border);color:var(--text);
  padding:.3rem .75rem;border-radius:6px;font-family:'Space Mono',monospace;font-size:.58rem;
  cursor:pointer;transition:all .2s;}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.copy-btn.copied{border-color:var(--green);color:var(--green);}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:.5rem;margin-bottom:.8rem;}
.sbox{background:rgba(0,20,50,.4);border:1px solid var(--border);border-radius:6px;padding:.5rem;text-align:center;}
.sval{font-size:.85rem;font-weight:700;word-break:break-all;}
.slbl{font-size:.4rem;color:var(--dim);margin-top:.1rem;line-height:1.5;}
.detail{background:rgba(0,20,50,.3);border:1px solid var(--border);border-radius:6px;
  padding:.6rem .8rem;font-size:.56rem;line-height:2;margin-bottom:.6rem;}
.detail span{color:var(--bright);}
.pipeline{display:flex;align-items:center;gap:.3rem;margin-bottom:.8rem;flex-wrap:wrap;justify-content:center;}
.pstep{background:rgba(0,20,50,.5);border:1px solid var(--border);border-radius:6px;
  padding:.3rem .6rem;font-size:.5rem;text-align:center;min-width:80px;}
.pstep.active{border-color:var(--accent);color:var(--accent);}
.pstep.done{border-color:var(--green);color:var(--green);}
.pstep.fail{border-color:var(--red);color:var(--red);}
.parrow{color:var(--dim);font-size:.7rem;}
.nlist{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.4rem;}
.nchip{padding:.15rem .4rem;border-radius:3px;font-size:.6rem;font-weight:700;}
.nhit{background:rgba(0,255,157,.12);border:1px solid rgba(0,255,157,.3);color:var(--green);}
.nmiss{background:rgba(255,61,90,.1);border:1px solid rgba(255,61,90,.25);color:var(--red);}
.htitle{font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:.4rem;}
.hrow{display:flex;justify-content:space-between;align-items:center;padding:.2rem 0;
  border-bottom:1px solid rgba(20,31,53,.5);font-size:.55rem;}
.hrow:last-child{border-bottom:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="logo">∿</div>
  <h1>مولّد الأوليات — شبكة المرايا v3</h1>
  <div class="sub">H. CHAOUCHI 2026 · خوارزمية الرنين الطيفي + Miller-Rabin · NO LIMIT</div>
</header>

<!-- خط الأنابيب -->
<div class="card" style="padding:.8rem 1.2rem;">
  <div style="font-size:.48rem;color:var(--dim);text-align:center;margin-bottom:.5rem;letter-spacing:.1em;">خط الأنابيب — PIPELINE</div>
  <div class="pipeline">
    <div class="pstep" id="ps0">① mod 30<br>فلتر أساسي</div>
    <div class="parrow">→</div>
    <div class="pstep" id="ps1">② الرنين<br>H_gamma</div>
    <div class="parrow">→</div>
    <div class="pstep" id="ps2">③ Miller-Rabin<br>تحقق نهائي</div>
    <div class="parrow">→</div>
    <div class="pstep" id="ps3" style="border-color:var(--green);color:var(--green);">✓ أولي<br>مؤكد</div>
  </div>
</div>

<div class="card">
  <div class="input-row">
    <input type="text" id="numInput" placeholder="أدخل عدداً للبدء منه..." autocomplete="off">
    <button class="go-btn" id="goBtn">▶</button>
  </div>
  <div class="modes">
    <button class="mbtn active" id="m0">هل هو أولي؟<br><small style="color:var(--dim)">فوري · أي حجم</small></button>
    <button class="mbtn" id="m1">الأولي التالي<br><small style="color:var(--dim)">بعد n</small></button>
    <button class="mbtn" id="m2">أوليات قريبة<br><small style="color:var(--dim)">±100 من n</small></button>
  </div>
  <div class="hint" id="hint">الرنين الطيفي يُرشّح · Miller-Rabin يُؤكد — لا ضجيج</div>
</div>

<div class="card result" id="resultCard">
  <div class="verdict" id="vbox">
    <div class="vnum" id="vnum">—</div>
    <div class="vlbl" id="vlbl">—</div>
    <div class="vtim" id="vtim"></div>
    <button class="copy-btn" id="copyBtn" style="display:none" onclick="copyResult()">⧉ نسخ العدد</button>
  </div>
  <div class="sgrid" id="sgrid"></div>
  <div class="detail" id="detail"></div>
  <div id="extraBlock" style="display:none">
    <div style="font-size:.5rem;letter-spacing:.1em;color:var(--dim);margin-bottom:.35rem" id="extraTitle"></div>
    <div class="nlist" id="nlist"></div>
  </div>
</div>

<div class="card">
  <div class="htitle">◈ سجل الاستعلامات</div>
  <div id="hlist"><div style="color:var(--dim);font-size:.54rem">— لا يوجد سجل —</div></div>
</div>

<script>
// ===== Miller-Rabin الحتمي =====
var WITNESSES = [2n,3n,5n,7n,11n,13n,17n,19n,23n,29n,31n,37n];

function modpow(base, exp, mod) {
  var result = 1n;
  base = base % mod;
  while(exp > 0n) {
    if(exp % 2n === 1n) result = result * base % mod;
    exp = exp / 2n;
    base = base * base % mod;
  }
  return result;
}

function millerRabin(n) {
  if(n < 2n) return false;
  if(n === 2n || n === 3n) return true;
  if(n % 2n === 0n) return false;
  var d = n - 1n, r = 0n;
  while(d % 2n === 0n) { d /= 2n; r++; }
  for(var i=0; i<WITNESSES.length; i++) {
    var a = WITNESSES[i];
    if(a >= n) continue;
    var x = modpow(a, d, n);
    if(x === 1n || x === n-1n) continue;
    var composite = true;
    for(var j=0n; j<r-1n; j++) {
      x = x * x % n;
      if(x === n-1n) { composite=false; break; }
    }
    if(composite) return false;
  }
  return true;
}

// ===== خوارزمية الرنين الطيفي H_gamma =====
var R_CLASSES = [1,7,11,13,17,19,23,29];
var TAU = {1:-1.02359,7:-0.87441,11:-0.93203,13:-0.94951,17:-0.97712,19:-1.00318,23:-0.99274,29:-1.00836};

// الفلتر 1: mod 30
function passesMod30(n) {
  var r = Number(n % 30n);
  return R_CLASSES.includes(r);
}

// الفلتر 2: الرنين الطيفي
function passesResonance(n) {
  var r = Number(n % 30n);
  var tauR = TAU[r] !== undefined ? TAU[r] : 0;
  var ln_n = Math.log(Number(n));
  var waves = R_CLASSES.map(function(rc){
    return Math.cos((TAU[rc] + tauR) * ln_n);
  });
  var re_fm = waves.reduce(function(a,b){return a+b;}, 0);
  var signal = re_fm / Math.sqrt(ln_n);
  var mean = re_fm / 8;
  var variance = waves.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/8;
  var threshold = -0.55 / Math.log10(ln_n);
  return (signal < threshold) && (variance < 0.48);
}

// الفلتر الكامل: mod30 + رنين + Miller-Rabin
function fullCheck(n) {
  var mod30 = passesMod30(n);
  if(!mod30) return {prime:false, mod30:false, resonance:false, mr:false};
  var res = passesResonance(n);
  // Miller-Rabin دائماً للتحقق النهائي
  var mr = millerRabin(n);
  return {prime:mr, mod30:true, resonance:res, mr:mr};
}

function nextPrime(n) {
  var x = n + 1n;
  if(x <= 2n) return 2n;
  if(x % 2n === 0n) x++;
  while(true) {
    if(passesMod30(x)) {
      if(millerRabin(x)) return x;
    }
    x += 2n;
  }
}

function primesInRange(lo, hi) {
  var result = [];
  var x = lo < 2n ? 2n : lo;
  if(x === 2n) { result.push(2n); x = 3n; }
  if(x % 2n === 0n) x++;
  while(x <= hi) {
    if(passesMod30(x) && millerRabin(x)) result.push(x);
    x += 2n;
  }
  return result;
}

// ===== واجهة =====
var currentMode = 0;
var historyLog = [];
var lastPrimeRaw = '';

function setPipeline(mod30, res, mr) {
  var p0 = document.getElementById('ps0');
  var p1 = document.getElementById('ps1');
  var p2 = document.getElementById('ps2');
  p0.className = 'pstep ' + (mod30 ? 'done' : 'fail');
  p1.className = 'pstep ' + (!mod30 ? '' : res ? 'done' : 'fail');
  p2.className = 'pstep ' + (!mod30 ? '' : mr ? 'done' : 'fail');
}

function formatBig(n) {
  var s = n.toString();
  if(s.length <= 15) return s.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  return s.slice(0,6)+'…'+s.slice(-6)+' ('+s.length+' رقم)';
}

function copyResult() {
  if(!lastPrimeRaw) return;
  var btn = document.getElementById('copyBtn');
  var done = function(){
    btn.textContent='✓ تم النسخ!'; btn.classList.add('copied');
    setTimeout(function(){btn.textContent='⧉ نسخ العدد';btn.classList.remove('copied');},2000);
  };
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(lastPrimeRaw).then(done).catch(function(){
      var ta=document.createElement('textarea');ta.value=lastPrimeRaw;
      ta.style.cssText='position:fixed;opacity:0;';document.body.appendChild(ta);
      ta.select();try{document.execCommand('copy');}catch(e){}document.body.removeChild(ta);done();
    });
  }
}

function setVerdict(cls,num,lbl,col,ms,raw){
  var vb=document.getElementById('vbox');
  vb.className='verdict '+cls;
  document.getElementById('vnum').textContent=num;
  document.getElementById('vnum').style.color=col;
  document.getElementById('vlbl').textContent=lbl;
  document.getElementById('vlbl').style.color=col;
  document.getElementById('vtim').textContent=ms!==undefined?'⏱ '+ms.toFixed(2)+' ms':'';
  var btn=document.getElementById('copyBtn');
  if(raw){lastPrimeRaw=raw;btn.style.display='inline-flex';}
  else btn.style.display='none';
}

function setStats(boxes){
  document.getElementById('sgrid').innerHTML=boxes.map(function(b){
    return '<div class="sbox"><div class="sval" style="color:'+b.col+'">'+b.val+'</div><div class="slbl">'+b.lbl+'</div></div>';
  }).join('');
}

function addHistory(q,res,col){
  historyLog.unshift({q:q,res:res,col:col});
  if(historyLog.length>8) historyLog.pop();
  document.getElementById('hlist').innerHTML=historyLog.map(function(h){
    return '<div class="hrow"><span style="color:var(--bright);font-weight:700">'+h.q+'</span><span style="color:'+h.col+'">'+h.res+'</span></div>';
  }).join('');
}

function parseInput(s){
  s=s.replace(/\s/g,'').replace(/,/g,'');
  if(!/^\d+$/.test(s)) return null;
  return BigInt(s);
}

function run(){
  var raw=document.getElementById('numInput').value.trim();
  var n=parseInput(raw);
  if(n===null||n<2n){alert('أدخل عدداً صحيحاً ≥ 2');return;}
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('extraBlock').style.display='none';
  var t0=performance.now();
  if(currentMode===0) doSingle(n,t0);
  else if(currentMode===1) doNextPrime(n,t0);
  else doNearby(n,t0);
}

function doSingle(n,t0){
  var res=fullCheck(n);
  var ms=performance.now()-t0;
  var mod30=Number(n%30n);

  setPipeline(res.mod30, res.resonance, res.mr);

  setVerdict(
    res.prime?'vp':'vn',
    formatBig(n),
    res.prime?'✓ عدد أولي مؤكد':'✗ عدد مركب',
    res.prime?'var(--green)':'var(--red)',
    ms,
    res.prime?n.toString():null
  );

  setStats([
    {val: res.mod30?'✓':'✗', lbl:'mod 30\nفلتر أساسي', col:res.mod30?'var(--accent)':'var(--dim)'},
    {val: res.resonance?'✓':'✗', lbl:'الرنين\nH_gamma', col:res.resonance?'var(--gold)':'var(--dim)'},
    {val: res.mr?'✓':'✗', lbl:'Miller-Rabin\nتحقق نهائي', col:res.mr?'var(--green)':'var(--red)'},
    {val: mod30, lbl:'n mod 30\nبصمة', col:'var(--accent)'}
  ]);

  document.getElementById('detail').innerHTML=
    '<span>عدد الأرقام:</span> '+n.toString().length+
    ' · <span>n mod 30:</span> '+mod30+
    '<br><span>① mod 30:</span> '+(res.mod30?'<span style="color:var(--green)">اجتاز ✓</span>':'<span style="color:var(--red)">استُبعد ✗</span>')+
    ' · <span>② رنين:</span> '+(res.resonance?'<span style="color:var(--gold)">اجتاز ✓</span>':'<span style="color:var(--red)">استُبعد ✗</span>')+
    ' · <span>③ MR:</span> '+(res.mr?'<span style="color:var(--green)">أولي ✓</span>':'<span style="color:var(--red)">مركب ✗</span>');

  addHistory(formatBig(n), res.prime?'أولي ✓':'مركب ✗', res.prime?'var(--green)':'var(--red)');
}

function doNextPrime(n,t0){
  var next=nextPrime(n);
  var gap=next-n;
  var res=fullCheck(next);
  var ms=performance.now()-t0;

  setPipeline(res.mod30, res.resonance, res.mr);

  setVerdict('vp', formatBig(next), 'أول عدد أولي بعد '+formatBig(n), 'var(--green)', ms, next.toString());
  setStats([
    {val:formatBig(next), lbl:'الأولي التالي', col:'var(--green)'},
    {val:gap.toString(), lbl:'الفجوة\nnext - n', col:'var(--accent)'},
    {val:res.resonance?'✓':'✗', lbl:'اجتاز\nالرنين', col:res.resonance?'var(--gold)':'var(--dim)'},
    {val:next.toString().length, lbl:'عدد\nالأرقام', col:'var(--purple)'}
  ]);

  document.getElementById('detail').innerHTML=
    '<span>n:</span> '+formatBig(n)+
    ' · <span>التالي:</span> '+formatBig(next)+
    ' · <span>الفجوة:</span> '+gap.toString()+
    ' · <span>زمن:</span> '+ms.toFixed(2)+' ms'+
    '<br><span>mod 30:</span> '+Number(next%30n)+
    ' · <span>الرنين:</span> '+(res.resonance?'<span style="color:var(--gold)">اجتاز ✓</span>':'<span style="color:var(--dim)">لم يجتز</span>')+
    ' · <span>MR:</span> <span style="color:var(--green)">مؤكد ✓</span>';

  addHistory('بعد '+formatBig(n), formatBig(next)+' (فجوة '+gap+')', 'var(--green)');
}

function doNearby(n,t0){
  var lo=n-100n<2n?2n:n-100n;
  var hi=n+100n;
  var primes=primesInRange(lo,hi);
  var ms=performance.now()-t0;

  var resonPassed=primes.filter(function(p){return passesResonance(p);});

  setPipeline(true, true, true);

  setVerdict('vm', primes.length.toString(), 'أولي في ['+formatBig(lo)+', '+formatBig(hi)+']', 'var(--gold)', ms, null);
  setStats([
    {val:primes.length, lbl:'أوليات\nفي النطاق', col:'var(--green)'},
    {val:resonPassed.length, lbl:'اجتازت\nالرنين', col:'var(--gold)'},
    {val:(primes.length>0?(resonPassed.length/primes.length*100).toFixed(0):0)+'%', lbl:'نسبة\nالرنين', col:'var(--accent)'},
    {val:ms.toFixed(1)+' ms', lbl:'زمن\nالبحث', col:'var(--purple)'}
  ]);

  document.getElementById('detail').innerHTML=
    '<span>النطاق:</span> ['+formatBig(lo)+' , '+formatBig(hi)+']'+
    ' · <span>الأوليات:</span> '+primes.length+
    ' · <span>اجتازت الرنين:</span> '+resonPassed.length;

  document.getElementById('extraBlock').style.display='block';
  document.getElementById('extraTitle').textContent='الأوليات — أخضر=اجتاز الرنين · أحمر=لم يجتز الرنين (MR يؤكد الجميع)';
  var resonSet=new Set(resonPassed.map(function(p){return p.toString();}));
  document.getElementById('nlist').innerHTML=primes.map(function(p){
    var hit=resonSet.has(p.toString());
    var isN=p===n;
    return '<span class="nchip '+(hit?'nhit':'nmiss')+'" style="'+(isN?'outline:1px solid var(--gold);':'')+'">'+(isN?'◉ ':'')+p.toString()+'</span>';
  }).join('');

  addHistory('حول '+formatBig(n), primes.length+' أولي', 'var(--gold)');
}

['m0','m1','m2'].forEach(function(id,i){
  document.getElementById(id).addEventListener('click',function(){
    currentMode=i;
    ['m0','m1','m2'].forEach(function(x){document.getElementById(x).classList.remove('active');});
    this.classList.add('active');
    var hints=['الرنين يُرشّح · Miller-Rabin يُؤكد — لا ضجيج','mod30 → MR مباشرة → أسرع بحث','الأوليات الحقيقية فقط ± 100'];
    document.getElementById('hint').textContent=hints[i];
  });
});

document.getElementById('goBtn').addEventListener('click',run);
document.getElementById('numInput').addEventListener('keydown',function(e){if(e.key==='Enter')run();});
</script>
</body>
</html>
